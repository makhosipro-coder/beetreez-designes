name: Migrate Database

on:
  workflow_dispatch:
    inputs:
      sql_file:
        description: 'SQL file to run'
        default: 'supabase/migrations/combined_remaining.sql'
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Run SQL migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref ejoscvxmctrqhayeyerj
          supabase db execute --file "${{ inputs.sql_file }}"
