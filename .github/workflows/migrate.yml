name: Migrate Database

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SQL migration
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require
        run: |
          set +e
          SQL_FILE="supabase/migrations/combined_remaining.sql"
          REF="ejoscvxmctrqhayeyerj"

          try_connect() {
            local host=$1 port=$2 user=$3 label=$4
            echo "=== $label ==="
            psql -h "$host" -p "$port" -U "$user" -d postgres -f "$SQL_FILE" 2>&1
            return $?
          }

          try_connect "aws-0-us-west-1.pooler.supabase.com" 6543 "postgres.$REF" "Pooler transaction mode"
          if [ $? -eq 0 ]; then echo "=== MIGRATION SUCCESS ==="; exit 0; fi

          try_connect "aws-0-us-west-1.pooler.supabase.com" 5432 "postgres.$REF" "Pooler session mode"
          if [ $? -eq 0 ]; then echo "=== MIGRATION SUCCESS ==="; exit 0; fi

          try_connect "db.$REF.supabase.co" 5432 "postgres" "Direct connection"
          if [ $? -eq 0 ]; then echo "=== MIGRATION SUCCESS ==="; exit 0; fi

          echo ""
          echo "========================================"
          echo "ALL CONNECTION ATTEMPTS FAILED."
          echo "Please paste the SQL manually at:"
          echo "https://supabase.com/dashboard/project/$REF/sql/new"
          echo "========================================"
          exit 1
