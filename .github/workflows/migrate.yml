name: Migrate Database

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SQL migration via psql
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          PGPASSWORD="$SUPABASE_DB_PASSWORD" psql \
            -h db.ejoscvxmctrqhayeyerj.supabase.co \
            -p 5432 \
            -U postgres \
            -d postgres \
            -f supabase/migrations/combined_remaining.sql
